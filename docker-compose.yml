services:
  # Base de données
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${DATABASE_PORT}:5432'
    healthcheck:
      test: [CMD-SHELL, 'pg_isready -U ${DATABASE_USER}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: [CMD-SHELL, redis-cli ping]
      interval: 5s
      timeout: 5s
      retries: 5

  maildev:
    container_name: lonestone-maildev
    image: netoun/mail-server-dev
    ports:
      - '${SMTP_PORT_WEB}:1080'
      - '${SMTP_PORT}:1025'

volumes:
  postgres_data:
  redis_data:
